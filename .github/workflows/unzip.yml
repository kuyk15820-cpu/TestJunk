name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: install dependencies
        run: brew install ldid xz

      - name: setup theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV

      - name: download ios sdk
        run: |
          mkdir -p /Users/runner/theos/sdks
          ln -s /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk /Users/runner/theos/sdks/iPhoneOS16.0.sdk

      - name: set timezone to thailand
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Bangkok /etc/localtime
          echo "TZ=Asia/Bangkok" >> $GITHUB_ENV
          date

      - name: generate single monolithic junk file inside JunkFiles (10MB+)
        run: |
          cat << 'EOF' > gen_junk.py
          import os
          import random
          import string

          def random_string(length=10):
              first_char = random.choice(string.ascii_letters)
              remaining = ''.join(random.choices(string.ascii_letters + string.digits, k=length-1))
              return first_char + remaining

          # บังคับสร้างโฟลเดอร์รองรับการค้นหาของ Makefile
          os.makedirs("JunkFiles", exist_ok=True)
          
          class_name = f"_gn_{random_string(8)}"
          total_functions = 150000
          func_names = [random_string(12) for _ in range(total_functions)]

          print(f"Generating single monolithic file inside JunkFiles/ with {total_functions} functions...")

          # สร้างไฟล์ไปไว้ที่โฟลเดอร์ JunkFiles
          with open("JunkFiles/JunkCodeMonolith.mm", "w") as f:
              f.write("#import <Foundation/Foundation.h>\n")
              f.write("#import <UIKit/UIKit.h>\n\n")
              
              f.write(f"@interface {class_name} : NSObject\n")
              for func_name in func_names:
                  f.write(f"- (void){func_name} __attribute__((used));\n")
              f.write("@end\n\n")
              
              f.write(f"@implementation {class_name}\n")
              for func_name in func_names:
                  f.write(f"- (void){func_name} __attribute__((used)) {{\n")
                  f.write(f"    int x = arc4random() % 100;\n")
                  f.write(f"    for(int i=0; i<5; i++) {{ x += i; }}\n")
                  f.write(f"    if (x == 999) {{ NSLog(@\"%%d\", x); }}\n")
                  f.write(f"}}\n")
              f.write("@end\n")

          print("Successfully generated JunkFiles/JunkCodeMonolith.mm (10MB+)!")
          EOF
          python3 gen_junk.py

      - name: build package
        run: |
          make clean
          make package
        env:
          THEOS: /Users/runner/theos

      - name: prepare build directory
        run: |
          mkdir -p build
          cp packages/*.ipa build/FXTool.ipa

      - name: upload artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: build/FXTool.ipa

      - name: upload release ipa
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/FXTool.ipa

  release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download ipa
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: build/

      - name: get last 12h commits
        run: |
          COMMITS=$(git log --since="12 hours ago" --pretty=format:"- %h %s (%an)")
          if [ -z "$COMMITS" ]; then
            COMMITS="no commits in the last 12 hours"
          fi
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: write release notes
        run: |
          cat <<EOF > release_notes.txt
          app nightly build
          
          Last 12 hours commits:
          
          ${COMMITS}
          EOF

      - name: update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly >/dev/null 2>&1 || \
          gh release create nightly \
            --title "Nightly" \
            --notes "initial nightly" \
            --prerelease
      
          gh release edit nightly \
            --title "Nightly Build" \
            --notes-file release_notes.txt \
            --prerelease
      
          gh release upload nightly build/FXTool.ipa --clobber
