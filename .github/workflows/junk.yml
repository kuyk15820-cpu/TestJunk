name: Generate One-Time Junk File

on:
  workflow_dispatch: # เปิดปุ่มให้คุณสามารถกดสั่งรันเองจากมือถือได้ทุกเมื่อ

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: run python generator
        run: |
          cat << 'EOF' > gen_junk_local.py
          import os
          import random

          os.makedirs("JunkFiles", exist_ok=True)
          filename = "JunkFiles/JunkCodeMonolith.mm"

          print("กำลังสร้างไฟล์ขยะขนาด 14MB+...")

          with open(filename, "w") as f:
              f.write("#import <Foundation/Foundation.h>\n")
              f.write("#import <UIKit/UIKit.h>\n\n")
              
              f.write("@interface _gn_StaticJunkMonolith : NSObject\n")
              f.write("- (void)executeJunkLogic __attribute__((used));\n")
              f.write("@end\n\n")
              
              f.write("@implementation _gn_StaticJunkMonolith\n")
              f.write("- (void)executeJunkLogic __attribute__((used)) {\n")
              
              # ใช้เทคนิค Byte Array ขนาดใหญ่ ดันขนาดไฟล์โตไว แต่คอมไพล์เร็ว
              for i in range(120):
                  junk_data = ", ".join([str(random.randint(0, 255)) for _ in range(15000)])
                  f.write(f"    static const unsigned char block_{i}[] = {{{junk_data}}};\n")
                  f.write(f"    if (block_{i}[0] == 999) {{ NSLog(@\"junk\"); }}\n\n")
                  
              f.write("}\n")
              f.write("@end\n")

          print("สร้างไฟล์เสร็จเรียบร้อย!")
          EOF
          python3 gen_junk_local.py

      - name: commit and push file back to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add JunkFiles/JunkCodeMonolith.mm
          git commit -m "Add permanent 14MB junk file"
          git push
